    .admin-stats-preset-btn { font-size: 0.8125rem; padding: 0; background: none; border: none; border-radius: 0; cursor: pointer; color: #8C8C8C; -webkit-tap-highlight-color: transparent; font-family: inherit; }
    .admin-stats-preset-btn:hover { color: #757575; }
    .admin-stats-preset-btn.active { color: var(--color-primary); font-weight: 500; }
    .admin-stats-alert-item { margin: 0; font-size: 0.875rem; }
    .admin-stats-alert-ok { color: var(--color-text-secondary); }
    .admin-stats-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; }
    .admin-stats-section h3 { font-size: 1rem; margin: 0 0 12px; font-weight: 600; }
    .admin-stats-section-hint { font-size: 0.75rem; color: #8C8C8C; font-weight: normal; margin-left: 6px; }
    .admin-stats-section .admin-stats-section-title-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .admin-stats-section .admin-stats-section-title-row .admin-stats-section-title { margin: 0; font-size: 1rem; font-weight: 600; }
    .admin-stats-menu-filter { display: inline-flex; gap: 5px; }
    .admin-stats-menu-filter-btn { font-size: 0.75rem; padding: 4px 8px; min-width: 52px; box-sizing: border-box; text-align: center; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-bg); cursor: pointer; color: var(--color-text-secondary); font-family: inherit; }
    .admin-stats-menu-filter-btn:hover { color: var(--color-text); border-color: #5C5C5C; }
    .admin-stats-menu-filter-btn.active { color: var(--color-primary); border-color: var(--color-primary); font-weight: 500; }
    .admin-stats-section h4 { font-size: 0.875rem; margin: 12px 0 8px; font-weight: 500; color: var(--color-text-secondary); }
    .admin-stats-brand-heading { margin-top: 10px; }
    .admin-stats-big { font-size: 1rem; margin: 0 0 12px; }
    .admin-stats-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .admin-stats-card { padding: 10px 14px; background: var(--color-bg); border-radius: var(--radius); font-size: 0.8125rem; display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
    .admin-stats-card-label { color: var(--color-text-secondary); }
    .admin-stats-card-value { font-weight: 600; font-size: 1rem; }
    .admin-stats-list { margin: 0; padding-left: 20px; font-size: 0.875rem; }
    .admin-stats-list li { margin-bottom: 4px; }
    .admin-stats-crm-intro { margin: 0 0 12px; font-size: 0.875rem; }
    .admin-stats-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .admin-stats-table-cols3 { table-layout: fixed; }
    .admin-stats-table-cols3 th:nth-child(1), .admin-stats-table-cols3 td:nth-child(1) { width: 40%; }
    .admin-stats-table-cols3 th:nth-child(2), .admin-stats-table-cols3 td:nth-child(2) { width: 30%; }
    .admin-stats-table-cols3 th:nth-child(3), .admin-stats-table-cols3 td:nth-child(3) { width: 30%; }
    .admin-stats-table th, .admin-stats-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
    .admin-stats-table th { font-weight: 600; color: var(--color-text-secondary); }
    .admin-stats-table-menu tbody tr { height: 3em; }
    .admin-stats-table-menu tbody td { height: 3em; min-height: 3em; max-height: 3em; box-sizing: border-box; vertical-align: middle; }
    .admin-stats-table-menu tbody td:first-child { overflow: hidden; }
    .admin-stats-error { padding: 20px; color: #c5221f; font-size: 0.9375rem; }
    .admin-settlement-clock { font-size: 1.125rem; font-weight: 600; margin-bottom: 20px; letter-spacing: 0.02em; }
    .admin-settlement-date-label { font-size: 0.875rem; }
    .admin-settlement-date-select { font-size: 0.875rem; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-bg); min-width: 140px; }
    .admin-settlement-caption { font-size: 0.8125rem; color: var(--color-text-secondary); margin: 0 0 12px; }
    .admin-settlement-empty { margin: 0; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-list-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; color: var(--color-text); }
    .admin-settlement-pending { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--color-border); }
    .admin-settlement-pending-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; color: var(--color-text); }
    .admin-settlement-table-cols5 { table-layout: fixed; }
    .admin-settlement-table-cols5 th:nth-child(1),
    .admin-settlement-table-cols5 td:nth-child(1) { width: 20%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(2),
    .admin-settlement-table-cols5 td:nth-child(2) { width: 20%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(3),
    .admin-settlement-table-cols5 td:nth-child(3) { width: 26%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(4),
    .admin-settlement-table-cols5 td:nth-child(4) { width: 17%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(5),
    .admin-settlement-table-cols5 td:nth-child(5) { width: 17%; box-sizing: border-box; }
    .admin-settlement-sample-hint { font-size: 0.75rem; color: var(--color-text-secondary); margin: 0 0 10px; font-style: italic; }
    .admin-settlement-statement-area { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--color-border); }
    .admin-settlement-statement-heading { font-size: 1rem; font-weight: 600; margin: 0 0 16px; }
    .admin-settlement-brand-select { padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius); font-size: 0.875rem; min-width: 160px; background: var(--color-bg); }
    .admin-settlement-statement-result { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; min-height: 80px; margin-bottom: 8px; }
    .admin-settlement-statement-print { max-width: 640px; margin: 0 auto; }
    .admin-settlement-statement-header { text-align: center; margin-bottom: 20px; }
    .admin-settlement-statement-logo { margin: 0 0 4px; font-size: 1.25rem; font-weight: 600; }
    .admin-settlement-statement-print .admin-settlement-statement-title { margin: 0 0 4px; font-size: 0.875rem; color: #000; }
    .admin-settlement-statement-period { margin: 0 0 12px; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-statement-hr { border: none; border-top: 1px solid var(--color-border); margin: 12px 0; }
    .admin-settlement-statement-hr--footer { margin: 20px 0 12px; }
    .admin-settlement-statement-brand { margin-bottom: 20px; font-size: 0.875rem; }
    .admin-settlement-statement-brand p { margin: 4px 0; }
    .admin-settlement-statement-bullet { padding-left: 0; list-style: none; }
    .admin-settlement-statement-body { margin-bottom: 12px; }
    .admin-settlement-statement-body > p { margin: 0 0 8px; font-size: 0.875rem; }
    .admin-settlement-statement-table { margin-bottom: 0; }
    .admin-settlement-statement-total { font-weight: 600; background: var(--color-bg); }
    .admin-settlement-statement-footer { font-size: 0.75rem; color: var(--color-text-secondary); text-align: left; }
    .admin-settlement-statement-footer p { margin: 4px 0; }
    .admin-settlement-statement-issuer { text-align: left; font-size: 0.8125rem; }
    .admin-settlement-statement-issuer p { margin: 2px 0; }
    .admin-settlement-pdf-btn { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .admin-settlement-pdf-btn:hover { opacity: 0.9; }
    @media (max-width: 768px) {
      .admin-tab[data-tab="stores"] { display: none; }
      .admin-tab[data-tab="settlement"] { display: none; }
      #storesView { display: none !important; }
      #settlementView { display: none !important; }
      .admin-tabs { display: flex; gap: 0; }
      .admin-tabs .admin-tab { flex: 1; min-width: 0; padding: 12px 6px; font-size: 0.8125rem; text-align: center; }
      .admin-payment-subfilter-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .admin-payment-order-info { font-size: 70%; }
      .admin-stats-table-menu tbody tr { height: 5em; }
      .admin-stats-table-menu tbody td { height: 5em; min-height: 5em; max-height: 5em; }
      .admin-stats-daterange { width: 100%; justify-content: flex-start; }
      .admin-stats-daterange input[type="date"] { flex: 1; min-width: 0; font-size: 0.8125rem; }
      .admin-stats-search-btn { margin-left: auto; flex-shrink: 0; }
      .admin-stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .admin-stats-card { min-width: 0; }
      .admin-stats-section-crm { display: none; }
    }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <h1>
        Admin
      </h1>
      <a href="/" class="admin-btn admin-btn-secondary">← 메인으로</a>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab" data-tab="stores">매장관리</button>
      <button class="admin-tab active" data-tab="payments">결제관리</button>
      <button class="admin-tab" data-tab="stats">통계관리</button>
      <button class="admin-tab" data-tab="settlement">정산관리</button>
    </div>

    <div id="adminError" class="admin-error" style="display: none;"></div>
    
    <div id="storesView" class="admin-view">
      <input type="file" id="adminMenuCsvInput" accept=".csv,text/csv" style="display:none" aria-hidden="true">
      <div id="adminContent">
        <div class="admin-loading">로딩 중...</div>
      </div>
    </div>

    <div id="paymentsView" class="admin-view active">
      <div id="adminPaymentContent">
        <div class="admin-loading">로딩 중...</div>
      </div>
    </div>

    <div id="statsView" class="admin-view">
      <div id="adminStatsContent">
        <div class="admin-loading">로딩 중...</div>
      </div>
    </div>

    <div id="settlementView" class="admin-view">
      <div id="adminSettlementContent"></div>
    </div>

    <div class="admin-order-detail-overlay" id="adminOrderDetailOverlay" aria-hidden="true">
      <div class="admin-order-detail-panel">
        <div class="admin-order-detail-header">
          <h3>주문 내역</h3>
          <div id="adminOrderDetailPdfWrap" class="admin-order-detail-pdf-wrap" style="display: none;"></div>
          <button type="button" class="admin-order-detail-close" id="adminOrderDetailClose" aria-label="닫기">&times;</button>
        </div>
        <div class="admin-order-detail-content" id="adminOrderDetailContent"></div>
        <div class="admin-order-detail-footer">
          <div class="admin-order-detail-total">
            <span>총 금액</span>
            <strong id="adminOrderDetailTotal">0원</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="admin-modal-overlay" id="adminApiSettingsModal" aria-hidden="true">
      <div class="admin-modal admin-modal-api-settings">
        <div class="admin-modal-header">
          <h3>매장 설정</h3>
          <button type="button" class="admin-modal-close" id="adminApiSettingsModalClose" aria-label="닫기">&times;</button>
        </div>
        <p class="admin-modal-store-name" id="adminApiSettingsStoreTitle">—</p>
        <div class="admin-modal-tabs">
          <button type="button" class="admin-modal-tab active" data-settings-tab="user-emails">사용자 등록</button>
          <button type="button" class="admin-modal-tab" data-settings-tab="business-days">영업 요일</button>
          <button type="button" class="admin-modal-tab" data-settings-tab="business-hours">영업 시간</button>
          <button type="button" class="admin-modal-tab" data-settings-tab="payment-env">결제키 환경변수</button>
        </div>
        <div class="admin-modal-body">
          <div class="admin-modal-panel active" id="adminSettingsPanelUserEmails">
            <div class="admin-form-row admin-user-emails-row">
              <input type="email" id="adminSettingsUserEmailInput" class="admin-form-input" placeholder="사용자 이메일을 등록하세요.">
              <button type="button" class="admin-btn admin-btn-primary" id="adminSettingsUserEmailAdd">추가</button>
            </div>
            <ul class="admin-user-emails-list" id="adminSettingsUserEmailsList"></ul>
          </div>
          <div class="admin-modal-panel" id="adminSettingsPanelBusinessDays">
            <p class="admin-modal-hint">매장 운영 요일 (참고용)</p>
            <div class="admin-business-days" id="adminApiSettingsBusinessDays">
              <label class="admin-business-day"><input type="checkbox" data-day="0" value="0"> 일</label>
              <label class="admin-business-day"><input type="checkbox" data-day="1" value="1"> 월</label>
              <label class="admin-business-day"><input type="checkbox" data-day="2" value="2"> 화</label>
              <label class="admin-business-day"><input type="checkbox" data-day="3" value="3"> 수</label>
              <label class="admin-business-day"><input type="checkbox" data-day="4" value="4"> 목</label>
              <label class="admin-business-day"><input type="checkbox" data-day="5" value="5"> 금</label>
              <label class="admin-business-day"><input type="checkbox" data-day="6" value="6"> 토</label>
            </div>
          </div>
          <div class="admin-modal-panel" id="adminSettingsPanelBusinessHours">
            <p class="admin-modal-hint">매장 운영 시간대 (참고용)</p>
            <div class="admin-business-hours" id="adminApiSettingsBusinessHours">
              <label class="admin-business-hour"><input type="checkbox" data-slot="09:00-10:00"> 09:00-10:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="10:00-11:00"> 10:00-11:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="11:00-12:00"> 11:00-12:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="12:00-13:00"> 12:00-13:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="13:00-14:00"> 13:00-14:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="14:00-15:00"> 14:00-15:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="15:00-16:00"> 15:00-16:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="16:00-17:00"> 16:00-17:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="17:00-18:00"> 17:00-18:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="18:00-19:00"> 18:00-19:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="19:00-20:00"> 19:00-20:00</label>
              <label class="admin-business-hour"><input type="checkbox" data-slot="20:00-21:00"> 20:00-21:00</label>
            </div>
          </div>
          <div class="admin-modal-panel" id="adminSettingsPanelPaymentEnv">
            <div class="admin-form-field">
              <label class="admin-form-label" for="adminApiSettingsEnvVar">환경변수 명칭</label>
              <input type="text" id="adminApiSettingsEnvVar" class="admin-form-input" placeholder="ENV. Variable" value="">
            </div>
          </div>
        </div>
        <div class="admin-modal-footer">
          <button type="button" class="admin-btn admin-btn-secondary" id="adminApiSettingsCancel">취소</button>
          <button type="button" class="admin-btn admin-btn-primary" id="adminApiSettingsApply">적용</button>
        </div>
      </div>
    </div>

    <div class="admin-modal-overlay" id="adminReorderStoresModal" aria-hidden="true">
      <div class="admin-modal">
        <div class="admin-modal-header">
          <h3>카테고리 순서 변경</h3>
          <button type="button" class="admin-modal-close" id="adminReorderStoresModalClose" aria-label="닫기">&times;</button>
        </div>
        <div class="admin-modal-body">
          <p class="admin-modal-hint">아래 목록에서 위/아래 버튼으로 순서를 바꾼 뒤 확인을 누르면 저장됩니다.</p>
          <ul class="admin-reorder-modal-list" id="adminReorderStoresList"></ul>
        </div>
        <div class="admin-modal-footer">
          <button type="button" class="admin-btn admin-btn-secondary" id="adminReorderStoresCancel">취소</button>
          <button type="button" class="admin-btn admin-btn-primary" id="adminReorderStoresConfirm">확인</button>
        </div>
      </div>
    </div>

    <div class="admin-modal-overlay" id="adminDeliveryCompleteModal" aria-hidden="true">
      <div class="admin-modal admin-modal-delivery-complete">
        <div class="admin-modal-header">
          <h3>발송 완료</h3>
          <button type="button" class="admin-modal-close" id="adminDeliveryCompleteModalClose" aria-label="닫기">&times;</button>
        </div>
        <div class="admin-modal-body">
          <button type="button" class="admin-btn admin-btn-primary admin-delivery-direct-btn" id="adminDeliveryCompleteDirectBtn">직접 배송 완료</button>
          <p class="admin-delivery-or">또는</p>
          <div class="admin-delivery-parcel-row">
            <select id="adminDeliveryCourierSelect" class="admin-delivery-courier-select">
              <option value="">택배사 선택</option>
              <option value="CJ대한통운">CJ대한통운</option>
              <option value="한진택배">한진택배</option>
              <option value="로젠택배">로젠택배</option>
              <option value="우체국택배">우체국택배</option>
              <option value="CU편의점택배">CU편의점택배</option>
              <option value="기타">기타</option>
            </select>
            <input type="text" id="adminDeliveryTrackingInput" class="admin-delivery-tracking-input" placeholder="송장 번호">
          </div>
          <button type="button" class="admin-btn admin-btn-primary admin-delivery-parcel-save-btn" id="adminDeliveryParcelSaveBtn">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
