<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브랜드관리 - Zero Mart</title>
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .store-orders-page { max-width: 900px; margin: 0 auto; padding: 24px; }
    .store-orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .store-orders-header h1 { font-size: 1.25rem; margin: 0; display: flex; align-items: center; gap: 10px; }
    .store-orders-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--color-border); }
    .store-orders-tab { padding: 12px 20px; font-size: 0.9375rem; font-weight: 500; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; color: var(--color-text-secondary); }
    .store-orders-tab:hover { color: var(--color-primary); }
    .store-orders-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .store-orders-view { display: none; }
    .store-orders-view.active { display: block; }
    .admin-btn-secondary { background: var(--color-border); color: var(--color-text); padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: none; font-family: inherit; text-decoration: none; display: inline-block; }
    .admin-btn-secondary:hover { background: #bdbdbd; }
    .admin-loading { text-align: center; padding: 48px; color: var(--color-text-secondary); }
    .admin-stats-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; }
    .admin-stats-daterange { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .admin-settlement-date-label { font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-caption { font-size: 0.875rem; color: var(--color-text-secondary); margin: 0 0 12px; }
    .admin-stats-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .admin-stats-table th, .admin-stats-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
    .admin-stats-table th { font-weight: 600; color: var(--color-text-secondary); }
    .admin-stats-error { padding: 20px; color: #c5221f; font-size: 0.9375rem; }
    .admin-settlement-empty { margin: 0; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-list-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; }
    .admin-settlement-pending { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--color-border); }
    .admin-settlement-pending-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; }
    .admin-settlement-table-cols5 { table-layout: fixed; }
    .admin-settlement-table-cols5 th:nth-child(1), .admin-settlement-table-cols5 td:nth-child(1) { width: 20%; }
    .admin-settlement-table-cols5 th:nth-child(2), .admin-settlement-table-cols5 td:nth-child(2) { width: 20%; }
    .admin-settlement-table-cols5 th:nth-child(3), .admin-settlement-table-cols5 td:nth-child(3) { width: 26%; }
    .admin-settlement-table-cols5 th:nth-child(4), .admin-settlement-table-cols5 td:nth-child(4) { width: 17%; }
    .admin-settlement-table-cols5 th:nth-child(5), .admin-settlement-table-cols5 td:nth-child(5) { width: 17%; }
    .admin-settlement-statement-area { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--color-border); }
    .admin-settlement-statement-heading { font-size: 1rem; font-weight: 600; margin: 0 0 16px; }
    .admin-settlement-brand-select { padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius); font-size: 0.875rem; min-width: 160px; background: var(--color-bg); }
    .admin-settlement-statement-result { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; min-height: 80px; margin-bottom: 8px; }
    .admin-settlement-statement-print { max-width: 640px; margin: 0 auto; }
    .admin-settlement-statement-header { text-align: center; margin-bottom: 20px; }
    .admin-settlement-statement-logo { margin: 0 0 4px; font-size: 1.25rem; font-weight: 600; }
    .admin-settlement-statement-print .admin-settlement-statement-title { margin: 0 0 4px; font-size: 0.875rem; color: #000; }
    .admin-settlement-statement-period { margin: 0 0 12px; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-statement-hr { border: none; border-top: 1px solid var(--color-border); margin: 12px 0; }
    .admin-settlement-statement-hr--footer { margin: 20px 0 12px; }
    .admin-settlement-statement-brand { margin-bottom: 20px; font-size: 0.875rem; }
    .admin-settlement-statement-brand p { margin: 4px 0; }
    .admin-settlement-statement-bullet { padding-left: 0; list-style: none; }
    .admin-settlement-statement-body { margin-bottom: 12px; }
    .admin-settlement-statement-body > p { margin: 0 0 8px; font-size: 0.875rem; }
    .admin-settlement-statement-table { margin-bottom: 0; }
    .admin-settlement-statement-total { font-weight: 600; background: var(--color-bg); }
    .admin-settlement-statement-footer { font-size: 0.75rem; color: var(--color-text-secondary); text-align: left; }
    .admin-settlement-statement-footer p { margin: 4px 0; }
    .admin-settlement-statement-issuer { text-align: left; font-size: 0.8125rem; }
    .admin-settlement-statement-issuer p { margin: 2px 0; }
    .admin-settlement-pdf-btn { background: var(--color-primary); color: #fff; border: none; padding: 8px 16px; font-size: 0.875rem; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
    .admin-settlement-pdf-btn:hover { opacity: 0.9; }
    .admin-btn { padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: none; font-family: inherit; }
    @media (max-width: 768px) {
      .store-orders-tabs .store-orders-tab { flex: 1; min-width: 0; padding: 12px 6px; font-size: 0.8125rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="store-orders-page">
    <div class="store-orders-header">
      <h1>브랜드관리</h1>
      <a href="/" class="admin-btn admin-btn-secondary">← 메인으로</a>
    </div>

    <div class="store-orders-tabs">
      <button type="button" class="store-orders-tab active" data-brand-tab="settlement" aria-selected="true">정산관리</button>
    </div>

    <div id="brandManagerSettlementView" class="store-orders-view active">
      <div id="brandManagerSettlementContent"></div>
    </div>
  </div>

  <script src="/brand-manager/brand-manager.js"></script>
</body>
</html>
