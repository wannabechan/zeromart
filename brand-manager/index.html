<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브랜드관리 - Zero Mart</title>
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .store-orders-page { max-width: 900px; margin: 0 auto; padding: 24px; }
    .store-orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .store-orders-header h1 { font-size: 1.25rem; margin: 0; display: flex; align-items: center; gap: 10px; }
    .store-orders-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--color-border); }
    .store-orders-tab { padding: 12px 20px; font-size: 0.9375rem; font-weight: 500; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; color: var(--color-text-secondary); }
    .store-orders-tab:hover { color: var(--color-primary); }
    .store-orders-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .store-orders-view { display: none; }
    .store-orders-view.active { display: block; }
    .admin-btn-secondary { background: var(--color-border); color: var(--color-text); padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: none; font-family: inherit; text-decoration: none; display: inline-block; }
    .admin-btn-secondary:hover { background: #bdbdbd; }
    .admin-loading { text-align: center; padding: 48px; color: var(--color-text-secondary); }
    .admin-stats-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; }
    .admin-stats-section h3 { font-size: 1rem; margin: 0 0 12px; font-weight: 600; }
    .admin-stats-daterange { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .admin-settlement-date-label { font-size: 0.875rem; }
    .admin-settlement-date-select { font-size: 0.875rem; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-bg); min-width: 140px; }
    .admin-settlement-caption { font-size: 0.8125rem; color: var(--color-text-secondary); margin: 0 0 12px; }
    .admin-stats-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .admin-stats-table th, .admin-stats-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
    .admin-stats-table th { font-weight: 600; color: var(--color-text-secondary); }
    .admin-stats-error { padding: 20px; color: #c5221f; font-size: 0.9375rem; }
    .admin-settlement-empty { margin: 0; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-list-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; color: var(--color-text); }
    .admin-settlement-pending { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--color-border); }
    .admin-settlement-pending-heading { font-size: 0.875rem; font-weight: 600; margin: 0 0 12px; color: var(--color-text); }
    .admin-settlement-table-cols5 { table-layout: fixed; }
    .admin-settlement-table-cols5 th:nth-child(1),
    .admin-settlement-table-cols5 td:nth-child(1) { width: 20%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(2),
    .admin-settlement-table-cols5 td:nth-child(2) { width: 20%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(3),
    .admin-settlement-table-cols5 td:nth-child(3) { width: 26%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(4),
    .admin-settlement-table-cols5 td:nth-child(4) { width: 17%; box-sizing: border-box; }
    .admin-settlement-table-cols5 th:nth-child(5),
    .admin-settlement-table-cols5 td:nth-child(5) { width: 17%; box-sizing: border-box; }
    .admin-settlement-total-row { font-weight: 600; background: var(--color-bg); }
    .admin-settlement-sample-hint { font-size: 0.75rem; color: var(--color-text-secondary); margin: 0 0 10px; font-style: italic; }
    .admin-settlement-statement-area { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--color-border); }
    .admin-settlement-statement-heading { font-size: 1rem; font-weight: 600; margin: 0 0 16px; }
    .admin-settlement-brand-select { padding: 8px 10px; border: 1px solid var(--color-border); border-radius: var(--radius); font-size: 0.875rem; min-width: 160px; background: var(--color-bg); }
    .admin-settlement-statement-result { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; min-height: 80px; margin-bottom: 8px; }
    .admin-settlement-statement-print { max-width: 640px; margin: 0 auto; }
    .admin-settlement-statement-header { text-align: center; margin-bottom: 20px; }
    .admin-settlement-statement-logo { margin: 0 0 4px; font-size: 1.25rem; font-weight: 600; }
    .admin-settlement-statement-print .admin-settlement-statement-title { margin: 0 0 4px; font-size: 0.875rem; color: #000; }
    .admin-settlement-statement-period { margin: 0 0 12px; font-size: 0.875rem; color: var(--color-text-secondary); }
    .admin-settlement-statement-hr { border: none; border-top: 1px solid var(--color-border); margin: 12px 0; }
    .admin-settlement-statement-hr--footer { margin: 20px 0 12px; }
    .admin-settlement-statement-brand { margin-bottom: 20px; font-size: 0.875rem; }
    .admin-settlement-statement-brand p { margin: 4px 0; }
    .admin-settlement-statement-bullet { padding-left: 0; list-style: none; }
    .admin-settlement-statement-body { margin-bottom: 12px; }
    .admin-settlement-statement-body > p { margin: 0 0 8px; font-size: 0.875rem; }
    .admin-settlement-statement-table { margin-bottom: 0; }
    .admin-settlement-statement-total { font-weight: 600; background: var(--color-bg); }
    .admin-settlement-statement-footer { font-size: 0.75rem; color: var(--color-text-secondary); text-align: left; }
    .admin-settlement-statement-footer p { margin: 4px 0; }
    .admin-settlement-statement-issuer { text-align: left; font-size: 0.8125rem; }
    .admin-settlement-statement-issuer p { margin: 2px 0; }
    .admin-settlement-pdf-btn { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .admin-settlement-pdf-btn:hover { opacity: 0.9; }
    .admin-btn { padding: 8px 16px; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: none; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .admin-order-detail-overlay.visible { opacity: 1; visibility: visible; }
    .admin-payment-order { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); margin-bottom: 16px; padding: 16px; }
    .admin-payment-order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .admin-payment-order-id { font-weight: 600; font-size: 1rem; }
    .admin-payment-order-status { font-size: 0.8125rem; padding: 4px 8px; border-radius: 4px; }
    .admin-payment-order-status.payment_completed { background: rgba(22, 163, 74, 0.12); color: #16a34a; }
    .admin-payment-order-status.delivery_completed { background: none; color: var(--color-text); }
    .admin-payment-order-status.cancelled { background: rgba(197, 34, 31, 0.1); color: #c5221f; }
    .admin-payment-order-info { font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 12px; }
    .admin-payment-order-info div { margin-bottom: 4px; }
    .admin-payment-order-id-link { cursor: pointer; text-decoration: underline; }
    .admin-payment-sort { margin-bottom: 12px; }
    .admin-payment-period-btns { display: flex; gap: 0; }
    .admin-payment-period-btns .admin-payment-period-btn { margin-right: 7px; }
    .admin-payment-period-btns .admin-payment-period-btn:last-child { margin-right: 0; }
    .admin-payment-period-range { font-size: 0.8125rem; color: #8C8C8C; margin-top: 4px; }
    .admin-payment-sort-btn { padding: 8px 16px; font-size: 0.875rem; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-bg); cursor: pointer; }
    .admin-payment-sort-btn.active { border-color: var(--color-primary); background: rgba(44, 44, 44, 0.12); color: var(--color-primary); }
    .admin-payment-period-btn { transform: scale(0.9); transform-origin: left center; }
    .admin-payment-subfilter { margin-bottom: 16px; }
    .admin-payment-subfilter-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .admin-payment-subfilter-item { font-size: 0.8125rem; color: #8C8C8C; cursor: pointer; }
    .admin-payment-subfilter-item.active { color: var(--color-primary); font-weight: 500; }
    .admin-payment-load-more-wrap { text-align: center; margin-top: 20px; }
    .admin-payment-load-more-btn { padding: 10px 24px; font-size: 0.9375rem; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-bg); cursor: pointer; }
    .admin-order-detail-item { padding: 8px 0; border-bottom: 1px solid var(--color-border); }
    .admin-order-detail-item:last-child { border-bottom: none; }
    .admin-order-detail-cancelled .cart-category-total { text-decoration: line-through; color: var(--color-text-secondary); }
    @media (max-width: 768px) {
      .store-orders-tabs .store-orders-tab { flex: 1; min-width: 0; padding: 12px 6px; font-size: 0.8125rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="store-orders-page">
    <div class="store-orders-header">
      <h1>브랜드관리</h1>
      <a href="/" class="admin-btn admin-btn-secondary">← 메인으로</a>
    </div>

    <div class="store-orders-tabs">
      <button type="button" class="store-orders-tab active" data-brand-tab="orders" aria-selected="true">주문관리</button>
      <button type="button" class="store-orders-tab" data-brand-tab="settlement" aria-selected="false">정산관리</button>
    </div>

    <div id="brandManagerOrdersView" class="store-orders-view active">
      <div id="brandManagerOrdersContent"></div>
    </div>

    <div id="brandManagerSettlementView" class="store-orders-view">
      <div id="brandManagerSettlementContent"></div>
    </div>

    <div class="admin-order-detail-overlay" id="brandManagerOrderDetailOverlay" aria-hidden="true" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;">
      <div class="admin-order-detail-panel" style="width:100%;max-width:400px;max-height:70dvh;background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,0.15);">
        <div class="admin-order-detail-header" style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--color-border);">
          <h3 style="font-size:1rem;font-weight:600;margin:0;">주문 내역</h3>
          <button type="button" class="admin-order-detail-close" id="brandManagerOrderDetailClose" aria-label="닫기">&times;</button>
        </div>
        <div class="admin-order-detail-content" id="brandManagerOrderDetailContent" style="flex:1;min-height:0;overflow-y:auto;padding:16px;"></div>
        <div class="admin-order-detail-footer" style="padding:16px 20px;border-top:1px solid var(--color-border);">
          <div class="admin-order-detail-total" style="display:flex;justify-content:space-between;align-items:center;font-size:0.9375rem;">
            <span>총 금액</span>
            <strong id="brandManagerOrderDetailTotal">0원</strong>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/brand-manager/brand-manager.js"></script>
</body>
</html>
