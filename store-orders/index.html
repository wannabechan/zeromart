<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문관리 - Zero Mart</title>
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .store-orders-placeholder { max-width: 480px; margin: 80px auto; padding: 24px; text-align: center; }
    .store-orders-placeholder h1 { font-size: 1.25rem; margin: 0 0 16px; font-weight: 600; }
    .store-orders-placeholder p { color: var(--color-text-secondary); font-size: 0.9375rem; margin: 0 0 24px; }
    .store-orders-placeholder a { display: inline-block; padding: 12px 24px; font-size: 0.9375rem; font-weight: 500; border-radius: var(--radius); background: var(--color-primary); color: #fff; text-decoration: none; }
    .store-orders-placeholder a:hover { background: var(--color-primary-hover); }
  </style>
</head>
<body>
  <div class="store-orders-placeholder">
    <h1>주문관리</h1>
    <p>해당 페이지는 재설계 예정입니다.</p>
    <a href="/">메인으로</a>
  </div>
</body>
</html>
